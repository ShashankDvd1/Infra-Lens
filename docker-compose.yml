version: "3.9"

services:
  # --- Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    restart: unless-stopped

  # --- Backend ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PHOENIX_CLIENT_HEADERS=api_key=None
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:6006
      - CELERY_BROKER_URL=redis://cache:6379/0
      - CELERY_RESULT_BACKEND=redis://cache:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
      phoenix:
        condition: service_started
    restart: unless-stopped

  # --- PostgreSQL + PostGIS + pgvector ---
  db:
    image: pgvector/pgvector:pg16
    container_name: db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: landscape
      POSTGRES_PASSWORD: landscape
      POSTGRES_DB: landscape_ai
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landscape -d landscape_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Redis ---
  cache:
    image: redis:7-alpine
    container_name: cache
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    restart: unless-stopped

  # --- MinIO (Object Store) ---
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # --- Phoenix (LLM Observability) ---
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    ports:
      - "6006:6006" # UI and API
      - "4317:4317" # OTLP gRPC
    volumes:
      - phoenixdata:/phoenix/data
    restart: unless-stopped

  # --- Celery Worker ---
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: celery_worker
    command: celery -A app.ingestion.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://cache:6379/0
      - CELERY_RESULT_BACKEND=redis://cache:6379/0
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:6006
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - cache
    restart: unless-stopped

  # --- Prometheus (Metrics) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheusdata:/prometheus
    restart: unless-stopped

  # --- Grafana (Dashboards) ---
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  # --- Loki (Log Aggregation) ---
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - lokidata:/loki
    restart: unless-stopped

  # --- Uptime Kuma (Endpoint Monitoring) ---
  uptime_kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime_kuma
    ports:
      - "3002:3001"
    volumes:
      - kumadata:/app/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  phoenixdata:
  prometheusdata:
  grafanadata:
  lokidata:
  kumadata:

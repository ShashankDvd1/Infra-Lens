events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
    
    # Cache path for map tiles
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=map_cache:10m max_size=1g inactive=7d use_temp_path=off;

    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # API requests → FastAPI
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # WebSocket for AI chat streaming
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 300s;
        }

        # Health check → FastAPI
        location /health {
            proxy_pass http://backend;
        }

        # OpenAPI docs → FastAPI
        location /docs {
            proxy_pass http://backend;
        }

        location /openapi.json {
            proxy_pass http://backend;
        }

        # Everything else → Next.js
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Next.js HMR WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Cache map tiles
        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
            proxy_cache map_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
            proxy_pass http://frontend;
            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header X-Proxy-Cache $upstream_cache_status;
        }
    }
}
